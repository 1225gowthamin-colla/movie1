<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management | Trackly Pro</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-logo">A</div>
                <span class="brand-name">Trackly Pro</span>
            </div>
            <nav class="nav-menu">
                <li class="nav-item"><a href="index.html">Dashboard</a></li>
                <li class="nav-item active"><a href="students.html">Students</a></li>
                <li class="nav-item"><a href="attendance.html">Mark Attendance</a></li>
                <li class="nav-item"><a href="analytics.html">AI Analytics</a></li>
                <li class="nav-item" style="margin-top: auto;"><a href="#" id="logoutBtn">Logout</a></li>
            </nav>
        </aside>

        <main class="main-content">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem;">
                <div>
                    <h1 style="font-size: 1.875rem; font-weight: 700;">Student Management</h1>
                    <p class="text-muted">Manage system users and academic records</p>
                </div>
                <button id="addStudentBtn" class="btn btn-primary">
                    + Add New Student
                </button>
            </header>

            <!-- Filters -->
            <div class="card" style="padding: 1rem; margin-bottom: 1.5rem; display: flex; gap: 15px; align-items: center;">
                <input type="text" id="searchInput" class="form-control" placeholder="Search by name or ID..." style="max-width: 300px; margin-bottom: 0;">
                <select id="courseFilter" class="form-control" style="max-width: 200px; margin-bottom: 0;">
                    <option value="">All Courses</option>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Information Technology">Information Technology</option>
                    <option value="Architecture">Architecture</option>
                </select>
            </div>

            <!-- Student Table -->
            <div class="card">
                <div class="table-container">
                    <table id="studentsTable">
                        <thead>
                            <tr>
                                <th>Student Info</th>
                                <th>Course</th>
                                <th>Statistics</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Data injected by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal for adding student (simplified) -->
    <div id="studentModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2000; justify-content:center; align-items:center;">
        <div class="card" style="width:100%; max-width:500px; margin-bottom:0;">
            <h2 style="margin-bottom:1.5rem;">Enroll New Student</h2>
            <form id="addStudentForm">
                <div class="form-group">
                    <label>Internal User ID</label>
                    <input type="text" id="userId" class="form-control" placeholder="Enter User UUID" required>
                </div>
                <div class="form-group">
                    <label>Student ID</label>
                    <input type="text" id="studentId" class="form-control" placeholder="STU-12345" required>
                </div>
                <div class="form-group">
                    <label>Course</label>
                    <input type="text" id="course" class="form-control" placeholder="e.g. Computer Science" required>
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <input type="text" id="department" class="form-control" placeholder="e.g. Engineering" required>
                </div>
                <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:1.5rem;">
                    <button type="button" class="btn" onclick="document.getElementById('studentModal').style.display='none'">Cancel</button>
                    <button type="submit" class="btn btn-primary">Enroll Student</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        let allStudents = [];

        document.addEventListener('DOMContentLoaded', async () => {
            loadStudents();

            document.getElementById('addStudentBtn').onclick = () => {
                document.getElementById('studentModal').style.display = 'flex';
            };

            document.getElementById('addStudentForm').onsubmit = async (e) => {
                e.preventDefault();
                const data = {
                    userId: document.getElementById('userId').value,
                    studentId: document.getElementById('studentId').value,
                    course: document.getElementById('course').value,
                    department: document.getElementById('department').value
                };
                try {
                    await api.request('/students', 'POST', data);
                    ui.showToast('Student enrolled successfully!', 'success');
                    document.getElementById('studentModal').style.display = 'none';
                    loadStudents();
                } catch (err) {
                    ui.showToast(err.message, 'error');
                }
            };

            document.getElementById('searchInput').oninput = filterTable;
            document.getElementById('courseFilter').onchange = filterTable;
            
            document.getElementById('logoutBtn').onclick = (e) => {
                e.preventDefault();
                localStorage.clear();
                window.location.href = '/login.html';
            };
        });

        async function loadStudents() {
            try {
                const res = await api.getStudents();
                allStudents = res.data;
                renderTable(allStudents);
            } catch (err) {
                ui.showToast('Failed to load students', 'error');
            }
        }

        function renderTable(students) {
            const tbody = document.querySelector('#studentsTable tbody');
            tbody.innerHTML = students.map(s => `
                <tr>
                    <td>
                        <div style="font-weight: 600;">${s.user?.name || 'N/A'}</div>
                        <div class="text-muted" style="font-size: 0.75rem;">${s.studentId}</div>
                    </td>
                    <td>
                        <div>${s.course}</div>
                        <div class="text-muted" style="font-size: 0.75rem;">${s.department}</div>
                    </td>
                    <td>
                        <div style="font-weight: 700; color: ${s.attendancePercentage < 75 ? 'var(--danger)' : 'var(--success)'}">
                            ${s.attendancePercentage.toFixed(1)}%
                        </div>
                        <div class="text-muted" style="font-size: 0.75rem;">${s.presentCount}/${s.totalClasses} classes</div>
                    </td>
                    <td><span class="badge badge-success">${s.status}</span></td>
                    <td>
                        <button class="btn" style="padding: 4px 8px; font-size: 0.8rem;">View Logs</button>
                    </td>
                </tr>
            `).join('');
        }

        function filterTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const course = document.getElementById('courseFilter').value;
            
            const filtered = allStudents.filter(s => {
                const matchesSearch = s.user?.name?.toLowerCase().includes(query) || s.studentId.toLowerCase().includes(query);
                const matchesCourse = course === "" || s.course === course;
                return matchesSearch && matchesCourse;
            });
            
            renderTable(filtered);
        }
    </script>
</body>
</html>
