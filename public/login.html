<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Attendance Tracker Pro</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-header h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--bg-sidebar);
        }
    </style>
</head>
<body>
    <div class="card login-card">
        <div class="login-header">
            <div class="brand-logo" style="margin: 0 auto 1rem;">A</div>
            <h1>Welcome Back</h1>
            <p class="text-muted">Sign in to your account</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="name@company.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
                Sign In
            </button>
        </form>

        <div style="margin-top: 2rem; text-align: center; font-size: 0.875rem;">
            <p class="text-muted">Role-based access system</p>
            <div style="margin-top: 0.5rem; display: flex; gap: 10px; justify-content: center;">
                <span class="badge badge-success">Student</span>
                <span class="badge badge-warning">Teacher</span>
                <span class="badge badge-danger">Admin</span>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await api.login({ email, password });
                if (response.success) {
                    localStorage.setItem('token', response.token);
                    localStorage.setItem('user', JSON.stringify(response));
                    ui.showToast('Login successful!', 'success');
                    
                    // Redirect based on role or to dashboard
                    setTimeout(() => {
                        window.location.href = '/index.html';
                    }, 1000);
                }
            } catch (error) {
                ui.showToast(error.message, 'error');
            }
        });
    </script>
</body>
</html>
